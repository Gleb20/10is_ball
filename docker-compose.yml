services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tab10
      POSTGRES_PASSWORD: tab10
      POSTGRES_DB: tab10
    volumes:
      - tab10_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tab10 -d tab10"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tab10_pg:
